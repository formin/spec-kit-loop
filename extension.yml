schema_version: "1.0"

extension:
  id: loop
  name: "Loop Engineering"
  version: "1.0.0"
  description: "Engineer safe autonomous agent loops for spec-driven development: a maker/checker split, externalized loop state, and stay-the-engineer guardrails against comprehension debt and cognitive surrender"
  category: "process"
  effect: "read-write"
  author: formin
  repository: https://github.com/formin/spec-kit-loop
  license: MIT
  homepage: https://github.com/formin/spec-kit-loop

requires:
  speckit_version: ">=0.2.0"

provides:
  commands:
    - name: speckit.loop.define
      file: commands/speckit.loop.define.md
      description: "Define an autonomous loop as a recursive goal: purpose, done-criteria, iteration budget, maker/checker roles, allowed tools, and guardrails — externalized to per-feature loop state files"
    - name: speckit.loop.run
      file: commands/speckit.loop.run.md
      description: "Run maker iterations toward the loop's goal, externalizing every iteration to disk; the maker never grades itself and stops to hand off to the checker"
    - name: speckit.loop.check
      file: commands/speckit.loop.check.md
      description: "Independent checker pass (separate from the maker) that adversarially grades the latest iteration against the done-criteria and records a durable verdict"
    - name: speckit.loop.guard
      file: commands/speckit.loop.guard.md
      description: "Stay-the-engineer checkpoint: surface comprehension debt and unattended-verification risk, then require explicit human sign-off before the loop may declare done"
    - name: speckit.loop.status
      file: commands/speckit.loop.status.md
      description: "Render a compact, budget-aware slice of loop state (goal, per-criterion progress, verdicts, open debt) with one recommended next action; safe session resume"

  config:
    - name: "loop-config.yml"
      template: "config-template.yml"
      description: "Iteration budgets, maker/checker policy, guardrail toggles, and rendering slice sizes"
      required: false

hooks:
  after_tasks:
    command: speckit.loop.define
    optional: true
    prompt: "Define an autonomous loop to drive these tasks to completion (maker/checker split, externalized state)?"
    description: "Set up a loop contract after task generation"
  after_implement:
    command: speckit.loop.check
    optional: true
    prompt: "Run an independent checker pass on this implementation (the model that wrote the code should not be the one to grade it)?"
    description: "Adversarial maker/checker verification after implementation"

tags:
  - "loop-engineering"
  - "automation"
  - "verification"
  - "maker-checker"
  - "workflow"

defaults:
  loop:
    max_iterations: 8              # hard ceiling on maker iterations before forced human review
    done_requires_checker_pass: true
    isolation: worktree           # worktree | none — how parallel iterations stay non-conflicting
  checker:
    independent: true             # the checker must not be the same context/agent as the maker
    adversarial: true             # the checker tries to break the work, not confirm it
    votes: 1                      # number of independent checker passes that must agree
  guard:
    require_human_signoff: true   # a human must sign off before the loop is "done"
    track_comprehension_debt: true
    block_done_on_open_debt: true # open blocking debt prevents declaring done
  rendering:
    iterations_slice: 6           # most-recent maker iterations rendered by status
    debt_slice: 8                 # open comprehension-debt items rendered by status
    context_tokens: 4000          # soft cap for loop state rendered into context per step
  state:
    directory: loop               # subdirectory of the active feature dir (specs/NNN-name/loop/)
    fallback_directory: .specify/loops/global  # used when no feature directory exists
